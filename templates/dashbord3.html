<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 40px; background: #ffffff; color: #1a1a1a; }
        .card { background: #f0f4ff; padding: 20px; border-radius: 10px; border-left: 4px solid #0055ff; }
        h1 { color: #0055ff; }
        .btn-sair { display: inline-block; padding: 10px 20px; background: #0055ff; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .btn-sair:hover { background: #003dcc; }
    </style>
</head>
<body>
    <h1>📊 Dashboard 3</h1>
    <div class="card">
        <p>Dashboard 3</p>
    </div>
    <br>
    <a href="/goto/electro" class="btn-sair">✕ Sair</a>
</body>
</html>
